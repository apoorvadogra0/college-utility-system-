<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Utility System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎓 College Utility System</div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#" onclick="showSection('dashboard')">Dashboard</a></li>
                <li><a href="#" onclick="showSection('courses')">Courses</a></li>
                <li><a href="#" onclick="showSection('attendance')">Attendance</a></li>
                <li><a href="#" onclick="showSection('grades')">Grades</a></li>
                <li><a href="#" onclick="showSection('notices')">Notices</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Auth Section -->
    <div id="authSection" class="auth-container">
        <div class="auth-box">
            <h1>College Utility System</h1>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2>Student Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button onclick="login()">Login</button>
                <p id="loginError" class="error-message"></p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <h2>Student Registration</h2>
                <input type="text" id="registerName" placeholder="Full Name" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="password" id="registerPassword" placeholder="Password" required>
                <input type="text" id="registerRoll" placeholder="Roll Number" required>
                <select id="registerDept" required>
                    <option value="">Select Department</option>
                    <option value="CSE">Computer Science</option>
                    <option value="ECE">Electronics</option>
                    <option value="ME">Mechanical</option>
                    <option value="CE">Civil</option>
                </select>
                <button onclick="register()">Register</button>
                <p id="registerError" class="error-message"></p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="main-content" style="display: none;">
        <!-- Dashboard Section -->
        <section id="dashboardSection" class="section active">
            <h2>Dashboard</h2>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Courses</h3>
                    <p class="stat-number" id="totalCourses">0</p>
                </div>
                <div class="stat-card">
                    <h3>Attendance</h3>
                    <p class="stat-number" id="avgAttendance">0%</p>
                </div>
                <div class="stat-card">
                    <h3>Current GPA</h3>
                    <p class="stat-number" id="currentGPA">0.0</p>
                </div>
                <div class="stat-card">
                    <h3>Notices</h3>
                    <p class="stat-number" id="totalNotices">0</p>
                </div>
            </div>
        </section>

        <!-- Courses Section -->
        <section id="coursesSection" class="section">
            <h2>My Courses</h2>
            <div id="coursesList" class="courses-container"></div>
        </section>

        <!-- Attendance Section -->
        <section id="attendanceSection" class="section">
            <h2>Attendance</h2>
            <div id="attendanceList" class="attendance-container"></div>
        </section>

        <!-- Grades Section -->
        <section id="gradesSection" class="section">
            <h2>My Grades</h2>
            <div id="gradesList" class="grades-container"></div>
        </section>

        <!-- Notices Section -->
        <section id="noticesSection" class="section">
            <h2>College Notices</h2>
            <div id="noticesList" class="notices-container"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
